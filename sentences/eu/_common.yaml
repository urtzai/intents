language: eu
responses:
  errors:
    no_intent: "Barkatu, ez dizut ulertu"
    no_area: "Ez dago {{ area }} izeneko gunerik"
    no_domain_in_area: "{{ area }} guneak ez dauka {{ domain }} moduko elementurik"
    no_device_class_in_area: "Ez dago {{ device_class }} motako elementurik {{ area }} gunean"
    no_entity: "Ez da {{ entity }} izeneko gailu edo entitaterik existitzen"
    handle_error: "Espero ez zen errore bat gertatu da agindua prozesatzean"

lists:
  todo_list_item:
    wildcard: true
  timer_name:
    wildcard: true
  timer_seconds:
    range:
      type: "number"
      from: 1
      to: 100
  timer_minutes:
    range:
      type: "number"
      from: 1
      to: 100
  timer_hours:
    range:
      type: "number"
      from: 1
      to: 100
  timer_half:
    values:
      - "erdi"
      - "erdi bat"
      - "1/2"
  color:
    values:
      - in: "zuria"
        out: "white"
      - in: "beltza"
        out: "black"
      - in: "gorria"
        out: "red"
      - in: "laranja"
        out: "orange"
      - in: "horia"
        out: "yellow"
      - in: "berdea"
        out: "green"
      - in: "urdina"
        out: "blue"
      - in: "morea"
        out: "purple"
      - in: "marroia"
        out: "brown"
  brightness:
    range:
      type: "percentage"
      from: 0
      to: 100
  temperature:
    range:
      type: "temperature"
      from: 0
      to: 100
  brightness_level:
    values:
      - in: (maximoa|altuena|gorena)
        out: 100
      - in: (minimoa|baxuena|txikiena)
        out: 1
  on_off_states:
    values:
      - in: "piztuta"
        out: "on"
      - in: "itzalita"
        out: "off"
  on_off_domains:
    values:
      - in: argi|lanpara
        out: light
      - in: haizegailu
        out: fan
      - in: etengailu
        out: switch

expansion_rules:
  timer_duration_seconds: "{timer_seconds:seconds}[ ]segundoko"
  timer_duration_minutes: "({timer_minutes:minutes}[ ]minutu [[eta] {timer_seconds:seconds}[ ]segundoko])|({timer_minutes:minutes}[ ]minutuko [[eta] {timer_seconds:seconds}[ ]segundoko])|({timer_minutes:minutes} minutu eta [minutu] {timer_half:seconds}ko)|([minutu] {timer_half:seconds}ko)"
  timer_duration_hours: "({timer_hours:hours}[ ]ordu [[eta] {timer_minutes:minutes}[ ]minutuko] [[eta] {timer_seconds:seconds}[ ]segundoko])|({timer_hours:hours}[ ]orduko [[eta] {timer_minutes:minutes}[ ]minutuko] [[eta] {timer_seconds:seconds}[ ]segundoko])|({timer_hours:hours} ordu eta [ordu] {timer_half:minutes}ko)|([ordu] {timer_half:minutes}ko)"
  timer_duration: "<timer_duration_seconds>|<timer_duration_minutes>|<timer_duration_hours>"
  timer_start_seconds: "{timer_seconds:start_seconds}[ ]segundoko"
  timer_start_minutes: "({timer_minutes:start_minutes}[ ]minutu [[eta] {timer_seconds:start_seconds}[ ]segundoko])|({timer_minutes:start_minutes}[ ]minutuko [[eta] {timer_seconds:start_seconds}[ ]segundoko])|({timer_minutes:start_minutes} minutu eta [minutu] {timer_half:start_seconds}ko)|([minutu] {timer_half:start_seconds}ko)"
  timer_start_hours: "({timer_hours:start_hours}[ ]ordu [[eta] {timer_minutes:start_minutes}[ ]minutuko] [[eta] {timer_seconds:start_seconds}[ ]segundoko])|({timer_hours:start_hours}[ ]orduko [[eta] {timer_minutes:start_minutes}[ ]minutuko] [[eta] {timer_seconds:start_seconds}[ ]segundoko])|({timer_hours:start_hours} ordu eta [ordu] {timer_half:start_minutes}ko)|([ordu] {timer_half:start_minutes}ko)"
  timer_start: "<timer_start_seconds>|<timer_start_minutes>|<timer_start_hours>"
  piztu: "(piztu|aktibatu|gaitu)"
  itzali: "(itzali|desaktibatu|ezgaitu)"
  piztuta: "(piztuta|aktibatuta|gaituta)"
  itzalita: "(itzalita|desaktibatuta|ezgaituta)"
  ahal: "(ahal|al)"
  zenbakia_ezarri: "(ezarri|jarri|ipini|aldatu)"
  distira: "(%{brightness}|ehuneko {brightness})"

skip_words:
  - "mesedez"
  - "eskerrik asko"
  - "niretzat"
  - "nahi dut"
